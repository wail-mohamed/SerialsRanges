spring.application.name=serials-app

# No embedded web server / no Tomcat
spring.main.web-application-type=none

# Local PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:8091/localdb
spring.datasource.username=localdbuser
spring.datasource.password=LocalDbUser@123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate creates/updates the table from the Java entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Helpful for seeing the generated SQL while testing
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
